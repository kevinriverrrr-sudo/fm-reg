name: Auto
on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: pip
      run: pip install requests
    - name: Run
      env:
        TK: ${{ secrets.TG_TOKEN }}
        GT: ${{ secrets.GH_TOK }}
      run: |
        python3 << 'Q'
        import requests as rq, re, time, json, random, string, os
        from datetime import datetime, timezone, timedelta
        from concurrent.futures import ThreadPoolExecutor, as_completed

        MSK = timezone(timedelta(hours=3))
        now = datetime.now(MSK)
        ds = now.strftime("%d.%m.%Y")

        fm = "https://" + __import__('base64').b64decode("ZnJlZW1vZGVsLmRldg==").decode()
        ge = "https://" + __import__('base64').b64decode("Z2VuZXJhdG9yLmVtYWls").decode()
        ta = "https://api.telegra.ph"

        DM = [
            "gmailxsn.com","paratrabajar.xyz","acqq.dev","alightmotion.cloud",
            "starcheck.in","cuaks.fun","dyera.studio","pawobby.cfd",
            "xsnipersquad.site","zavmecor.store","aeerso.space","masbahlil.xyz",
            "buyreview.us","xn-xp8h.bond","gmailxsn.space"
        ]
        FP = {'140729','217821','357961','989898','808080','980099','206088','178198','501435'}
        TK = os.environ.get("TK", "")
        HD = {"Content-Type":"application/json",
              "User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
              "Origin":fm,"Referer":fm+"/"}
        GH = {"Authorization":f"token {os.environ.get('GT','')}","Accept":"application/vnd.github+json"}
        repo = os.environ.get("GITHUB_REPOSITORY","")

        def ru():
            p = random.choice(["u","a","t","n","d","x","z","w","k","m"])
            return p + ''.join(random.choices(string.ascii_lowercase + string.digits, k=10))

        # probe: find working domains
        def probe():
            ok = []
            for d in DM:
                em = f"p{random.randint(10000,99999)}@{d}"
                try:
                    r = rq.post(f"{fm}/api/auth/send-otp", json={"email":em}, headers=HD, timeout=8)
                    if r.status_code == 200 and r.json().get("ok"):
                        ok.append(d)
                    elif r.status_code != 403:
                        ok.append(d)  # 429 might work with delay
                except:
                    pass
            return ok

        def reg(d):
            em = f"{ru()}@{d}"
            s = rq.Session()
            s.headers.update(HD)
            try:
                r = s.post(f"{fm}/api/auth/send-otp", json={"email":em}, timeout=10)
                if r.status_code != 200 or not r.json().get("ok"):
                    return None
                time.sleep(3)
                code = None
                for _ in range(7):
                    try:
                        ir = rq.get(f"{ge}/{em}", headers={"User-Agent":HD["User-Agent"]}, timeout=10)
                        tm = re.search(r'<title>(.*?)</title>', ir.text)
                        if tm and 'FreeModel' in tm.group(1):
                            cm = re.search(r'(\d{6})', tm.group(1))
                            if cm and cm.group(1) not in FP:
                                code = cm.group(1)
                                break
                    except:
                        pass
                    time.sleep(2)
                if not code:
                    return None
                vr = s.post(f"{fm}/api/auth/verify-otp", json={"email":em,"code":code}, timeout=10)
                if vr.status_code != 200 or "error" in vr.json():
                    return None
                bm = s.cookies.get("bm_session")
                ts = datetime.now(MSK).strftime("%H:%M:%S")
                return {"email":em,"cookie":f"bm_session={bm or 'none'}","ts":ts}
            except:
                return None

        def push_file(filepath, content):
            try:
                url = f"https://api.github.com/repos/{repo}/contents/{filepath}"
                r = rq.get(url, headers=GH, timeout=10)
                sha = r.json().get("sha","") if r.status_code == 200 else ""
                rq.put(url, headers=GH, timeout=15, json={
                    "message":f"update {filepath}",
                    "content":__import__('base64').b64encode(content.encode()).decode(),
                    "sha": sha
                })
            except:
                pass

        # Step 1: Probe domains
        wd = probe()
        print(f"Working domains: {wd}")
        if not wd:
            print("No working domains!")
            exit(0)

        # Step 2: Register with controlled parallelism
        accs = []
        # Phase 1: sequential on best domain (gmailxsn usually)
        if "gmailxsn.com" in wd:
            for _ in range(5):
                a = reg("gmailxsn.com")
                if a:
                    accs.append(a)
                    print(f"  + {a['email']}")
                time.sleep(2)

        # Phase 2: parallel on all working domains
        remaining = 20
        with ThreadPoolExecutor(max_workers=len(wd)) as ex:
            batch = []
            for _ in range(remaining):
                d = random.choice(wd)
                batch.append(ex.submit(reg, d))
            for f in as_completed(batch):
                a = f.result()
                if a:
                    accs.append(a)
                    print(f"  + {a['email']}")

        if not accs:
            print("0 accounts")
            exit(0)

        print(f"Total: {len(accs)}")

        # Step 3: Build telegra content
        ct = [
            {"tag":"h3","children":["FreeModel Free Accounts"]},
            {"tag":"p","children":[f"Updated: {ds} ({now.strftime('%H:%M:%S')}) MSK"]},
            {"tag":"hr"},
        ]
        for i, a in enumerate(accs):
            ct.append({"tag":"b","children":[f"{i+1}. {a['email']} ({a['ts']})"]})
            ct.append({"tag":"p","children":[a['cookie']]})
            ct.append({"tag":"hr"})

        # telegra state
        state = {"d":"","p":""}
        try:
            with open("st.json") as f:
                state = json.load(f)
        except:
            pass
        if state["d"] != ds:
            state["d"] = ds
            state["p"] = ""

        pp = state.get("p","")
        for attempt in range(3):
            try:
                if pp:
                    r = rq.post(f"{ta}/editPage", json={"access_token":TK,"path":pp,"title":f"FM {ds}","content":ct,"return_content":False}, timeout=15)
                else:
                    r = rq.post(f"{ta}/createPage", json={"access_token":TK,"title":f"FM {ds}","author_name":"FM","content":ct,"return_content":False}, timeout=15)
                d = r.json()
                if d.get("ok"):
                    state["p"] = d["result"]["path"]
                    print(f"Telegraph: https://telegra.ph/{d['result']['path']}")
                    break
                else:
                    pp = ""
                    time.sleep(2)
            except:
                time.sleep(2)

        with open("st.json","w") as f:
            json.dump(state, f)

        # Step 4: Build and push text file
        lines = []
        lines.append(f"FreeModel Free Accounts")
        lines.append(f"Date: {ds} | Updated: {now.strftime('%H:%M:%S')} MSK")
        lines.append(f"Telegraph: https://telegra.ph/{state['p']}")
        lines.append("=" * 60)
        for i, a in enumerate(accs):
            lines.append(f"\n[{i+1}] {a['email']}")
            lines.append(f"    Time: {a['ts']} MSK")
            lines.append(f"    Cookie: {a['cookie']}")
        lines.append(f"\n{'=' * 60}")
        lines.append(f"Total: {len(accs)} accounts")

        existing = ""
        try:
            r = rq.get(f"https://api.github.com/repos/{repo}/contents/accounts%2F{ds}.txt", headers=GH, timeout=10)
            if r.status_code == 200:
                existing = __import__('base64').b64decode(r.json()["content"]).decode()
        except:
            pass
        final = existing + "\n\n---\n\n" + "\n".join(lines) if existing else "\n".join(lines)
        push_file(f"accounts/{ds}.txt", final)
        print(f"Saved: accounts/{ds}.txt")
        Q
